---
name: nodenv-debian

on:
  push:
    paths:
      - 'share/app-nodenv/**'
      - make/apps/nodenv.mk
  workflow_run:
    workflows:
      - base-debian
    types:
      - completed

jobs:
  app:
    uses: ./.github/workflows/common-app-cached.yml
    strategy:
      matrix:
        distro:
          - debian
        application:
          - app-nodenv
        path_to_cache:
          - "~/.nodenv"
    with:
      distro: ${{ matrix.distro}}
      application: ${{ matrix.application }}
      path_to_cache: ${{ matrix.path_to_cache }}
