---
name: base-debian

on:
  push:
    paths:
      - 'docker/debian/**'
      - 'make/base/**'
      - 'make/distro/**'
      - Makefile
      - bootstrap.sh

jobs:
  build-docker:
    uses: ./.github/workflows/common-docker.yml
    strategy:
      matrix:
        distro:
          - debian
    with:
      distro: ${{ matrix.distro }}
