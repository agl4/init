---
name: sops-linux

on:
  push:
    paths:
      - make/apps/sops.mk
      - make/apps/cosign.mk
  workflow_run:
    workflows:
      - Docker images
    types:
      - completed

jobs:
  app:
    uses: ./.github/workflows/common-app.yml
    strategy:
      matrix:
        distro:
          - fedora-latest
          - ubuntu-rolling
          - ubuntu-devel
          - ubuntu-24.04
          - ubuntu-26.04
          - opensuse-tumbleweed
        application:
          - app-sops
    with:
      distro: ${{ matrix.distro}}
      application: ${{ matrix.application }}
